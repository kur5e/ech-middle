# ech-middle configuration
# Generated by: ech-middle guide

inbound:
    http:
        listen: :8080
    socks5:
        listen: :1080
access:
    ip_allow: []
    http_auth:
        enabled: false
        username: ""
        password: ""
    socks5_auth:
        enabled: false
        username: ""
        password: ""
outbound:
    interface: ""
    dns:
        intranet_safe: false
        servers:
            - https://v.recipes/dns/cloudflare-dns.com/dns-query
    timeout:
        dns: 5
        tls: 10
        idle: 120
ech:
    mode: strict
    inject: {}
    file_watch: 30
cf:
    enabled: false
    ech_config: ""
    auto_discover: true
    discover_from:
        - crypto.cloudflare.com
    ip_ranges: []
    ip_prefer: []
runtime:
    ca_dir: ""
    shutdown: immediate
    shutdown_timeout: 30
    log:
        level: debug
        file: ""
        color: true
